spring.application.name=oficina

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/oficina}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:oficina}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:oficina}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
