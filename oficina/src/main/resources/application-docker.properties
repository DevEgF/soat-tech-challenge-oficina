spring.application.name=oficina

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

# API autenticada por JWT (stateless). Session JDBC exige o mesmo DataSource/driver do Postgres;
# com variáveis de datasource vazias no container o Boot pode misturar URL H2 + driver Postgres e falhar ao subir.
spring.session.store-type=none

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
