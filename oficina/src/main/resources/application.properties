spring.application.name=oficina

app.jwt.secret=${APP_JWT_SECRET:dev-oficina-jwt-secret-troque-em-producao-32b}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:60}
app.security.admin.username=${APP_SECURITY_ADMIN_USERNAME:admin}
app.security.admin.password=${APP_SECURITY_ADMIN_PASSWORD:admin}

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# JPA/Hibernate — desenvolvimento local com H2: schema gerido pelo Hibernate (sem Flyway para evitar módulo DB específico do H2).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=false

# In-memory datasource for local development
spring.datasource.url=jdbc:h2:mem:oficina;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console (optional for local debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
